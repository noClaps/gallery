    <title>Gallery</title>
    <style>
        /* Root */
        html {
            font-family: system-ui;
        }

        img {
            max-width: 100%;
        }

        /* Text selection color */
        ::selection {
            background-color: #ff8f00;
        }

        ::-moz-selection {
            background-color: #ff8f00;
        }

        /* Header */
        header {
            margin: 1.5rem;
            height: 4rem;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
        }

        nav {
            display: flex;
            flex-direction: column;
            height: 100%;
            justify-content: space-between;
            text-align: right;
            font-size: 1.125rem;
        }

        @media (min-width: 447px) {
            nav {
                flex-direction: row;
                align-items: center;
            }
        }

        nav a {
            margin-left: 1rem;
            color: inherit;
            text-decoration: none;
            background-image: linear-gradient(#000, #000);
            background-position: 50% 100%;
            background-repeat: no-repeat;
            background-size: 0 2px;
            transition: background-size .25s ease-in-out;
        }

        nav a:hover {
            background-size: 100% 2px;
        }

        /* Gallery */
        /* Credits to https://www.youtube.com/watch?v=-isQPqqnIBo for the excellent Masonry grid tutorial */
        main {
            width: 100%;
            margin: 0 auto;
            columns: 20rem auto;
            column-gap: 0.5rem;
        }

        main img {
            margin-bottom: 0.5rem;
        }

        /* Lightbox */
        /* Credits to https://www.youtube.com/watch?v=6j5q-hP8sfk for the excellent Lightbox tutorial */
        .lightbox-img {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            transform: scale(0, 0);
            transition: transform ease-in-out 0.125s;
        }

        .lightbox-img:target {
            transform: scale(1, 1);
        }

        .lightbox-img img {
            max-width: 100%;
            max-height: 100%;
        }
    </style>
</head>
